<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Medidor Profissional - Outdoor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Container principal */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Tela de câmera para capturar */
        .camera-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 50;
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Tela de medição */
        .medicao-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 20;
            display: none;
        }

        #fotoCapturada {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #canvasMedicao {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            touch-action: none;
        }

        /* Botões da câmera */
        .camera-buttons {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            z-index: 60;
        }

        .capture-camera-btn {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            font-size: 40px;
            transition: 0.2s;
        }

        .gallery-btn {
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.5);
            font-size: 36px;
            transition: 0.2s;
        }

        .capture-camera-btn:active, .gallery-btn:active {
            transform: scale(0.95);
        }

        /* Botão olho */
        .eye-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
            font-size: 28px;
            transition: 0.2s;
        }

        .eye-btn:active {
            transform: scale(0.95);
        }

        /* Botão salvar (disquete) */
        .save-medicao-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 65px;
            height: 65px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            font-size: 28px;
            transition: 0.2s;
        }

        .save-medicao-btn:active {
            transform: scale(0.95);
        }

        /* Painel de controle */
        .painel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 16px;
            z-index: 25;
            transition: opacity 0.3s, visibility 0.3s;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .painel.oculto {
            opacity: 0;
            visibility: hidden;
        }

        /* Indicador de passo */
        .step-indicator {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            padding: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
        }

        .step {
            flex: 1;
            text-align: center;
            font-size: 12px;
            padding: 8px;
            border-radius: 30px;
            background: #333;
            color: #888;
        }

        .step.ativo {
            background: #2196f3;
            color: white;
        }

        .step.concluido {
            background: #4caf50;
            color: white;
        }

        .resultados {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            margin-bottom: 12px;
        }

        .area-grande {
            font-size: 36px;
            font-weight: bold;
            color: #ffaa44;
        }

        .medidas-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .medida-card {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 6px;
        }

        .medida-label {
            font-size: 11px;
            color: #aaa;
        }

        .medida-valor {
            font-size: 18px;
            font-weight: bold;
            color: #ffaa44;
        }

        .ref-group {
            background: #222;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .ref-title {
            font-size: 12px;
            color: #ffaa44;
            margin-bottom: 10px;
            text-align: center;
        }

        .orientacao {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .orientacao-btn {
            flex: 1;
            background: #444;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }

        .orientacao-btn.ativo {
            background: #ff9800;
        }

        .ref-input {
            margin-top: 8px;
        }

        .ref-input label {
            font-size: 12px;
            color: #aaa;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .input-group input {
            flex: 1;
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
        }

        .input-group button {
            background: #4caf50;
            padding: 10px 16px;
            width: auto;
            margin: 0;
        }

        button {
            background: #2196f3;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 6px;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-avancar {
            background: #4caf50;
        }

        /* Popup de compartilhamento */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .popup-overlay.oculto {
            display: none;
        }

        .popup-content {
            background: #1e1e2e;
            border-radius: 24px;
            padding: 24px;
            margin: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 350px;
            width: calc(100% - 40px);
        }

        .popup-content p {
            margin-bottom: 20px;
            font-size: 18px;
            color: #fff;
        }

        .popup-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .popup-buttons button {
            margin: 0;
            padding: 14px;
        }

        .btn-share {
            background: #25D366;
        }

        .btn-save {
            background: #2196f3;
        }

        .btn-cancel-popup {
            background: #f44336;
        }

        /* Input file escondido */
        #fileInput {
            display: none;
        }

        @media (max-width: 600px) {
            .area-grande { font-size: 28px; }
            .capture-camera-btn, .gallery-btn { width: 65px; height: 65px; font-size: 30px; }
            .step { font-size: 10px; padding: 6px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Tela de captura de foto -->
    <div class="camera-screen" id="cameraScreen">
        <video id="video" autoplay playsinline muted></video>
        <div class="camera-buttons">
            <div class="gallery-btn" id="galleryBtn">🖼️</div>
            <div class="capture-camera-btn" id="capturePhotoBtn">📷</div>
        </div>
    </div>

    <!-- Tela de medição -->
    <div class="medicao-screen" id="medicaoScreen">
        <img id="fotoCapturada" alt="Foto capturada">
        <canvas id="canvasMedicao"></canvas>

        <div class="eye-btn" id="eyeBtn">🚫</div>
        <div class="save-medicao-btn" id="saveMedicaoBtn">💾</div>

        <div class="painel" id="painel">
            <!-- Indicador de passos -->
            <div class="step-indicator">
                <div class="step" id="step1">📷 1. Capturar</div>
                <div class="step" id="step2">📏 2. Referência</div>
                <div class="step" id="step3">📐 3. Medir Área</div>
            </div>

            <div class="resultados">
                <div class="area-grande" id="areaDisplay">--- m²</div>
                <div class="medidas-row">
                    <div class="medida-card">
                        <div class="medida-label">📐 Altura</div>
                        <div class="medida-valor" id="alturaDisplay">--- m</div>
                    </div>
                    <div class="medida-card">
                        <div class="medida-label">📏 Largura</div>
                        <div class="medida-valor" id="larguraDisplay">--- m</div>
                    </div>
                </div>
            </div>

            <!-- PASSO 2: Configurar Referência -->
            <div id="passoReferencia" class="ref-group">
                <div class="ref-title">🔧 PASSO 2: CONFIGURAR REFERÊNCIA</div>
                <div class="orientacao">
                    <button id="orientVerticalBtn" class="orientacao-btn ativo">📏 Vertical</button>
                    <button id="orientHorizontalBtn" class="orientacao-btn">📐 Horizontal</button>
                </div>
                <div class="ref-input">
                    <label>Tamanho real da referência (metros):</label>
                    <div class="input-group">
                        <input type="number" id="refTamanho" step="0.01" placeholder="Ex: 1.00">
                        <button id="aplicarRef">Aplicar</button>
                    </div>
                </div>
                <div class="dica" style="font-size: 11px; color: #ffaa44; margin-top: 8px; text-align: center;">
                    ⚠️ Ajuste o retângulo VERMELHO sobre um objeto de tamanho conhecido
                </div>
            </div>

            <!-- PASSO 3: Medir Área (inicialmente oculto) -->
            <div id="passoMedicao" style="display: none;">
                <div class="ref-group">
                    <div class="ref-title">📐 PASSO 3: MEDIR ÁREA DA PLACA</div>
                    <div class="dica" style="font-size: 12px; color: #00ffcc; text-align: center; margin-bottom: 10px;">
                        Ajuste o retângulo VERDE sobre a placa/outdoor
                    </div>
                </div>
                <button id="finalizarBtn" class="btn-avancar">💾 Finalizar e Salvar Medição</button>
            </div>
        </div>
    </div>
</div>

<!-- Input para carregar arquivo -->
<input type="file" id="fileInput" accept="image/*">

<!-- Popup de compartilhamento -->
<div id="sharePopup" class="popup-overlay oculto">
    <div class="popup-content">
        <p>📸 Salvar Medição</p>
        <div class="popup-buttons">
            <button id="shareBtn" class="btn-share">📱 Compartilhar</button>
            <button id="saveLocalBtn" class="btn-save">💾 Salvar no Celular</button>
            <button id="cancelPopupBtn" class="btn-cancel-popup">✖️ Cancelar</button>
        </div>
    </div>
</div>

<script>
    // Elementos
    const cameraScreen = document.getElementById('cameraScreen');
    const medicaoScreen = document.getElementById('medicaoScreen');
    const video = document.getElementById('video');
    const capturePhotoBtn = document.getElementById('capturePhotoBtn');
    const galleryBtn = document.getElementById('galleryBtn');
    const fileInput = document.getElementById('fileInput');
    const fotoCapturada = document.getElementById('fotoCapturada');
    const canvasMedicao = document.getElementById('canvasMedicao');
    const ctx = canvasMedicao.getContext('2d');
    
    // Estado
    let passoAtual = 2;
    let painelVisivel = true;
    let orientacaoRef = 'vertical';
    let imagemCapturada = false;
    let fotoBase64 = null;
    let referenciaConfigurada = false;
    
    // Dimensões da imagem capturada
    let imgWidth = 0;
    let imgHeight = 0;
    let imgRect = { x: 0, y: 0, w: 0, h: 0 };
    
    // Retângulo de referência (vermelho)
    let referenciaRet = {
        x: 0.4, y: 0.5,
        width: 0.2, height: 0.2
    };
    
    // Retângulo de medição (verde)
    let retangulo = {
        x: 0.3, y: 0.3,
        width: 0.4, height: 0.4
    };
    
    let referenciaTamanhoReal = null;
    let pixelsPorMetro = null;
    let arrastando = false;
    let itemArrastando = null;
    let ultimoToque = null;
    
    // UI
    const areaDisplay = document.getElementById('areaDisplay');
    const alturaDisplay = document.getElementById('alturaDisplay');
    const larguraDisplay = document.getElementById('larguraDisplay');
    const eyeBtn = document.getElementById('eyeBtn');
    const saveMedicaoBtn = document.getElementById('saveMedicaoBtn');
    const painel = document.getElementById('painel');
    const passoReferencia = document.getElementById('passoReferencia');
    const passoMedicao = document.getElementById('passoMedicao');
    const orientVerticalBtn = document.getElementById('orientVerticalBtn');
    const orientHorizontalBtn = document.getElementById('orientHorizontalBtn');
    const refTamanho = document.getElementById('refTamanho');
    const aplicarRef = document.getElementById('aplicarRef');
    const finalizarBtn = document.getElementById('finalizarBtn');
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    
    const sharePopup = document.getElementById('sharePopup');
    const shareBtn = document.getElementById('shareBtn');
    const saveLocalBtn = document.getElementById('saveLocalBtn');
    const cancelPopupBtn = document.getElementById('cancelPopupBtn');
    
    let canvasW, canvasH;
    let cameraAtiva = false;
    let streamAtual = null;
    
    function atualizarPassos() {
        step1.classList.add('concluido');
        
        if (referenciaConfigurada) {
            step2.classList.add('concluido');
            step2.classList.remove('ativo');
            step3.classList.add('ativo');
            step3.classList.remove('concluido');
        } else {
            step2.classList.add('ativo');
            step2.classList.remove('concluido');
            step3.classList.remove('ativo', 'concluido');
        }
    }
    
    async function iniciarCamera() {
        try {
            if (streamAtual) {
                streamAtual.getTracks().forEach(track => track.stop());
            }
            const constraints = {
                video: {
                    facingMode: 'environment',
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            streamAtual = stream;
            video.srcObject = stream;
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
            cameraAtiva = true;
        } catch(err) {
            console.log("Erro ao acessar câmera:", err);
        }
    }
    
    function pararCamera() {
        if (streamAtual) {
            streamAtual.getTracks().forEach(track => track.stop());
            streamAtual = null;
        }
        cameraAtiva = false;
    }
    
    function processarImagem(imagemUrl) {
        fotoBase64 = imagemUrl;
        fotoCapturada.src = imagemUrl;
        
        fotoCapturada.onload = () => {
            imgWidth = fotoCapturada.naturalWidth;
            imgHeight = fotoCapturada.naturalHeight;
            calcularImgRect();
            resetMedicoes();
            cameraScreen.style.display = 'none';
            medicaoScreen.style.display = 'block';
            imagemCapturada = true;
            pararCamera();
            atualizarPassos();
            desenhar();
        };
    }
    
    function capturarFoto() {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const tempCtx = canvas.getContext('2d');
        tempCtx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imagemUrl = canvas.toDataURL('image/jpeg', 0.95);
        processarImagem(imagemUrl);
    }
    
    function carregarFotoArquivo(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            processarImagem(e.target.result);
        };
        reader.readAsDataURL(file);
        fileInput.value = '';
    }
    
    function abrirGaleria() {
        fileInput.click();
    }
    
    function calcularImgRect() {
        if (!imgWidth || !imgHeight) return;
        const canvasAspect = canvasW / canvasH;
        const imgAspect = imgWidth / imgHeight;
        
        if (imgAspect > canvasAspect) {
            imgRect.w = canvasW;
            imgRect.h = canvasW / imgAspect;
            imgRect.x = 0;
            imgRect.y = (canvasH - imgRect.h) / 2;
        } else {
            imgRect.h = canvasH;
            imgRect.w = canvasH * imgAspect;
            imgRect.x = (canvasW - imgRect.w) / 2;
            imgRect.y = 0;
        }
    }
    
    function normToPixel(p) {
        return {
            x: imgRect.x + p.x * imgRect.w,
            y: imgRect.y + p.y * imgRect.h
        };
    }
    
    function pixelToNorm(px, py) {
        return {
            x: (px - imgRect.x) / imgRect.w,
            y: (py - imgRect.y) / imgRect.h
        };
    }
    
    function getReferenciaPixels() {
        if (orientacaoRef === 'vertical') {
            return referenciaRet.height * imgRect.h;
        } else {
            return referenciaRet.width * imgRect.w;
        }
    }
    
    function atualizarEscala() {
        if (referenciaTamanhoReal && referenciaTamanhoReal > 0) {
            const tamanhoPx = getReferenciaPixels();
            if (tamanhoPx > 0) {
                pixelsPorMetro = tamanhoPx / referenciaTamanhoReal;
                return true;
            }
        }
        return false;
    }
    
    function getMetros() {
        if (!pixelsPorMetro || !referenciaConfigurada) return { altura: null, largura: null, area: null };
        const altPx = retangulo.height * imgRect.h;
        const largPx = retangulo.width * imgRect.w;
        const altM = altPx / pixelsPorMetro;
        const largM = largPx / pixelsPorMetro;
        return { altura: altM, largura: largM, area: altM * largM };
    }
    
    function aplicarRestricaoReferencia() {
        referenciaRet.x = Math.min(0.96, Math.max(0.02, referenciaRet.x));
        referenciaRet.y = Math.min(0.96, Math.max(0.02, referenciaRet.y));
        referenciaRet.width = Math.min(0.96 - referenciaRet.x, Math.max(0.05, referenciaRet.width));
        referenciaRet.height = Math.min(0.96 - referenciaRet.y, Math.max(0.05, referenciaRet.height));
    }
    
    function mudarOrientacao(orient) {
        orientacaoRef = orient;
        if (orient === 'vertical') {
            orientVerticalBtn.classList.add('ativo');
            orientHorizontalBtn.classList.remove('ativo');
        } else {
            orientVerticalBtn.classList.remove('ativo');
            orientHorizontalBtn.classList.add('ativo');
        }
        desenhar();
    }
    
    function desenhar() {
        if (!ctx || !imagemCapturada) return;
        ctx.clearRect(0, 0, canvasW, canvasH);
        
        if (imgRect.w === 0) calcularImgRect();
        
        const refPx = {
            x: imgRect.x + referenciaRet.x * imgRect.w,
            y: imgRect.y + referenciaRet.y * imgRect.h,
            w: referenciaRet.width * imgRect.w,
            h: referenciaRet.height * imgRect.h
        };
        
        ctx.strokeStyle = '#ff3366';
        ctx.lineWidth = 3;
        ctx.setLineDash([]);
        ctx.strokeRect(refPx.x, refPx.y, refPx.w, refPx.h);
        
        ctx.fillStyle = 'rgba(255,51,102,0.1)';
        ctx.fillRect(refPx.x, refPx.y, refPx.w, refPx.h);
        
        ctx.strokeStyle = '#ff8888';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.strokeRect(refPx.x + 2, refPx.y + 2, refPx.w - 4, refPx.h - 4);
        ctx.setLineDash([]);
        
        if (orientacaoRef === 'vertical') {
            ctx.font = "bold 10px sans-serif";
            ctx.fillStyle = '#ff8888';
            ctx.fillText("📏 Altura", refPx.x + refPx.w/2 + 5, refPx.y + refPx.h/2);
        } else {
            ctx.font = "bold 10px sans-serif";
            ctx.fillStyle = '#ff8888';
            ctx.fillText("📏 Largura", refPx.x + refPx.w/2 - 30, refPx.y + refPx.h/2 - 5);
        }
        
        if (!referenciaConfigurada) {
            const tamanhoAlca = 16;
            const cantos = [
                { x: refPx.x, y: refPx.y },
                { x: refPx.x + refPx.w, y: refPx.y },
                { x: refPx.x, y: refPx.y + refPx.h },
                { x: refPx.x + refPx.w, y: refPx.y + refPx.h }
            ];
            
            cantos.forEach(canto => {
                ctx.fillStyle = '#ff6666';
                ctx.beginPath();
                ctx.arc(canto.x, canto.y, tamanhoAlca/2, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(canto.x, canto.y, tamanhoAlca/3, 0, 2*Math.PI);
                ctx.fill();
            });
            
            const centroX = refPx.x + refPx.w/2;
            const centroY = refPx.y + refPx.h/2;
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(centroX, centroY, 12, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#ff6666';
            ctx.beginPath();
            ctx.arc(centroX, centroY, 6, 0, 2*Math.PI);
            ctx.fill();
        }
        
        if (referenciaTamanhoReal) {
            ctx.font = "bold 12px sans-serif";
            ctx.fillStyle = '#ff99aa';
            ctx.shadowBlur = 2;
            ctx.fillText(`${referenciaTamanhoReal.toFixed(2)}m`, refPx.x + refPx.w/2 - 20, refPx.y - 8);
            ctx.shadowBlur = 0;
        }
        
        if (referenciaConfigurada) {
            const retPx = {
                x: imgRect.x + retangulo.x * imgRect.w,
                y: imgRect.y + retangulo.y * imgRect.h,
                w: retangulo.width * imgRect.w,
                h: retangulo.height * imgRect.h
            };
            
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 3;
            ctx.strokeRect(retPx.x, retPx.y, retPx.w, retPx.h);
            
            ctx.fillStyle = 'rgba(0,255,200,0.1)';
            ctx.fillRect(retPx.x, retPx.y, retPx.w, retPx.h);
            
            ctx.strokeStyle = '#88ffcc';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.strokeRect(retPx.x + 2, retPx.y + 2, retPx.w - 4, retPx.h - 4);
            ctx.setLineDash([]);
            
            if (referenciaConfigurada) {
                const tamanhoAlca = 16;
                const cantos = [
                    { x: retPx.x, y: retPx.y },
                    { x: retPx.x + retPx.w, y: retPx.y },
                    { x: retPx.x, y: retPx.y + retPx.h },
                    { x: retPx.x + retPx.w, y: retPx.y + retPx.h }
                ];
                
                cantos.forEach(canto => {
                    ctx.fillStyle = '#00ffcc';
                    ctx.beginPath();
                    ctx.arc(canto.x, canto.y, tamanhoAlca/2, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(canto.x, canto.y, tamanhoAlca/3, 0, 2*Math.PI);
                    ctx.fill();
                });
                
                const centroX = retPx.x + retPx.w/2;
                const centroY = retPx.y + retPx.h/2;
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.arc(centroX, centroY, 12, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = '#00ffcc';
                ctx.beginPath();
                ctx.arc(centroX, centroY, 6, 0, 2*Math.PI);
                ctx.fill();
            }
            
            const dimensoes = getMetros();
            if (dimensoes.altura && dimensoes.largura) {
                ctx.font = "bold 14px sans-serif";
                ctx.shadowBlur = 0;
                
                const larguraTexto = `${dimensoes.largura.toFixed(2)}m`;
                const centerX = retPx.x + retPx.w/2;
                const medidaLargura = ctx.measureText(larguraTexto);
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(centerX - medidaLargura.width/2 - 5, retPx.y - 22, medidaLargura.width + 10, 20);
                ctx.fillStyle = '#00ffcc';
                ctx.fillText(larguraTexto, centerX - medidaLargura.width/2, retPx.y - 8);
                
                const alturaTexto = `${dimensoes.altura.toFixed(2)}m`;
                const medidaAltura = ctx.measureText(alturaTexto);
                const centerY = retPx.y + retPx.h/2;
                
                ctx.save();
                ctx.translate(retPx.x - 15, centerY);
                ctx.rotate(-Math.PI/2);
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(-medidaAltura.width/2 - 5, -10, medidaAltura.width + 10, 20);
                ctx.fillStyle = '#00ffcc';
                ctx.fillText(alturaTexto, -medidaAltura.width/2, 4);
                ctx.restore();
            }
        }
        
        atualizarEscala();
        const dimensoes = getMetros();
        if (dimensoes.altura && dimensoes.largura && referenciaConfigurada) {
            alturaDisplay.innerHTML = dimensoes.altura.toFixed(3) + ' m';
            larguraDisplay.innerHTML = dimensoes.largura.toFixed(3) + ' m';
            areaDisplay.innerHTML = dimensoes.area.toFixed(3) + ' m²';
        } else {
            alturaDisplay.innerHTML = '--- m';
            larguraDisplay.innerHTML = '--- m';
            areaDisplay.innerHTML = '--- m²';
        }
    }
    
    function verificarToque(px, py) {
        const refPx = {
            x: imgRect.x + referenciaRet.x * imgRect.w,
            y: imgRect.y + referenciaRet.y * imgRect.h,
            w: referenciaRet.width * imgRect.w,
            h: referenciaRet.height * imgRect.h
        };
        
        const tamanhoAlca = 35;
        
        if (!referenciaConfigurada) {
            if (Math.hypot(px - refPx.x, py - refPx.y) < tamanhoAlca) return 'refTL';
            if (Math.hypot(px - (refPx.x + refPx.w), py - refPx.y) < tamanhoAlca) return 'refTR';
            if (Math.hypot(px - refPx.x, py - (refPx.y + refPx.h)) < tamanhoAlca) return 'refBL';
            if (Math.hypot(px - (refPx.x + refPx.w), py - (refPx.y + refPx.h)) < tamanhoAlca) return 'refBR';
            
            const refCentroX = refPx.x + refPx.w/2;
            const refCentroY = refPx.y + refPx.h/2;
            if (Math.hypot(px - refCentroX, py - refCentroY) < 40) return 'refMover';
        }
        
        if (referenciaConfigurada) {
            const retPx = {
                x: imgRect.x + retangulo.x * imgRect.w,
                y: imgRect.y + retangulo.y * imgRect.h,
                w: retangulo.width * imgRect.w,
                h: retangulo.height * imgRect.h
            };
            
            if (Math.hypot(px - retPx.x, py - retPx.y) < tamanhoAlca) return 'cantoTL';
            if (Math.hypot(px - (retPx.x + retPx.w), py - retPx.y) < tamanhoAlca) return 'cantoTR';
            if (Math.hypot(px - retPx.x, py - (retPx.y + retPx.h)) < tamanhoAlca) return 'cantoBL';
            if (Math.hypot(px - (retPx.x + retPx.w), py - (retPx.y + retPx.h)) < tamanhoAlca) return 'cantoBR';
            
            const centroX = retPx.x + retPx.w/2;
            const centroY = retPx.y + retPx.h/2;
            if (Math.hypot(px - centroX, py - centroY) < 40) return 'mover';
        }
        
        return null;
    }
    
    function handleTouchStart(e) {
        if (!imagemCapturada) return;
        e.preventDefault();
        
        const rect = canvasMedicao.getBoundingClientRect();
        const scaleX = canvasMedicao.width / rect.width;
        const scaleY = canvasMedicao.height / rect.height;
        const touch = e.touches[0];
        let canvasX = (touch.clientX - rect.left) * scaleX;
        let canvasY = (touch.clientY - rect.top) * scaleY;
        canvasX = Math.min(Math.max(0, canvasX), canvasW);
        canvasY = Math.min(Math.max(0, canvasY), canvasH);
        
        const item = verificarToque(canvasX, canvasY);
        if (item) {
            arrastando = true;
            itemArrastando = item;
            ultimoToque = { x: canvasX, y: canvasY };
        }
    }
    
    function handleTouchMove(e) {
        if (!arrastando || !ultimoToque) return;
        e.preventDefault();
        
        const rect = canvasMedicao.getBoundingClientRect();
        const scaleX = canvasMedicao.width / rect.width;
        const scaleY = canvasMedicao.height / rect.height;
        const touch = e.touches[0];
        let canvasX = (touch.clientX - rect.left) * scaleX;
        let canvasY = (touch.clientY - rect.top) * scaleY;
        canvasX = Math.min(Math.max(0, canvasX), canvasW);
        canvasY = Math.min(Math.max(0, canvasY), canvasH);
        
        const deltaX = (canvasX - ultimoToque.x) / imgRect.w;
        const deltaY = (canvasY - ultimoToque.y) / imgRect.h;
        
        if (itemArrastando === 'cantoTL') {
            retangulo.width -= deltaX;
            retangulo.height -= deltaY;
            retangulo.x += deltaX;
            retangulo.y += deltaY;
        } else if (itemArrastando === 'cantoTR') {
            retangulo.width += deltaX;
            retangulo.height -= deltaY;
            retangulo.y += deltaY;
        } else if (itemArrastando === 'cantoBL') {
            retangulo.width -= deltaX;
            retangulo.height += deltaY;
            retangulo.x += deltaX;
        } else if (itemArrastando === 'cantoBR') {
            retangulo.width += deltaX;
            retangulo.height += deltaY;
        } else if (itemArrastando === 'mover') {
            retangulo.x += deltaX;
            retangulo.y += deltaY;
        } else if (itemArrastando === 'refTL') {
            referenciaRet.width -= deltaX;
            referenciaRet.height -= deltaY;
            referenciaRet.x += deltaX;
            referenciaRet.y += deltaY;
            aplicarRestricaoReferencia();
        } else if (itemArrastando === 'refTR') {
            referenciaRet.width += deltaX;
            referenciaRet.height -= deltaY;
            referenciaRet.y += deltaY;
            aplicarRestricaoReferencia();
        } else if (itemArrastando === 'refBL') {
            referenciaRet.width -= deltaX;
            referenciaRet.height += deltaY;
            referenciaRet.x += deltaX;
            aplicarRestricaoReferencia();
        } else if (itemArrastando === 'refBR') {
            referenciaRet.width += deltaX;
            referenciaRet.height += deltaY;
            aplicarRestricaoReferencia();
        } else if (itemArrastando === 'refMover') {
            referenciaRet.x += deltaX;
            referenciaRet.y += deltaY;
            aplicarRestricaoReferencia();
        }
        
        retangulo.x = Math.min(0.98, Math.max(0, retangulo.x));
        retangulo.y = Math.min(0.98, Math.max(0, retangulo.y));
        retangulo.width = Math.min(1 - retangulo.x, Math.max(0.02, retangulo.width));
        retangulo.height = Math.min(1 - retangulo.y, Math.max(0.02, retangulo.height));
        
        ultimoToque = { x: canvasX, y: canvasY };
        desenhar();
    }
    
    function handleTouchEnd() {
        arrastando = false;
        itemArrastando = null;
        desenhar();
    }
    
    function aplicarReferencia() {
        const valor = parseFloat(refTamanho.value);
        if (isNaN(valor) || valor <= 0) {
            alert("⚠️ Digite um valor válido maior que zero!\n\nExemplo: 1.00 para 1 metro");
            return;
        }
        
        referenciaTamanhoReal = valor;
        referenciaConfigurada = true;
        atualizarEscala();
        
        passoReferencia.style.display = 'none';
        passoMedicao.style.display = 'block';
        atualizarPassos();
        desenhar();
        
        alert(`✅ Referência configurada: ${valor.toFixed(2)} metros\n\nAgora ajuste o retângulo VERDE sobre a placa/outdoor.`);
    }
    
    function resetMedicoes() {
        retangulo = { x: 0.3, y: 0.3, width: 0.4, height: 0.4 };
        referenciaRet = {
            x: 0.4, y: 0.5,
            width: 0.2, height: 0.2
        };
        referenciaTamanhoReal = null;
        referenciaConfigurada = false;
        pixelsPorMetro = null;
        
        passoReferencia.style.display = 'block';
        passoMedicao.style.display = 'none';
        refTamanho.value = '';
        
        aplicarRestricaoReferencia();
        if (imagemCapturada) desenhar();
    }
    
    async function criarImagemFinal() {
        const dim = getMetros();
        
        const printCanvas = document.createElement('canvas');
        const printCtx = printCanvas.getContext('2d');
        
        printCanvas.width = canvasW;
        printCanvas.height = canvasH;
        
        const img = new Image();
        img.src = fotoBase64;
        await new Promise((resolve) => { img.onload = resolve; });
        
        printCtx.drawImage(img, 0, 0, img.width, img.height, imgRect.x, imgRect.y, imgRect.w, imgRect.h);
        
        const retPx = {
            x: imgRect.x + retangulo.x * imgRect.w,
            y: imgRect.y + retangulo.y * imgRect.h,
            w: retangulo.width * imgRect.w,
            h: retangulo.height * imgRect.h
        };
        printCtx.strokeStyle = '#00ffcc';
        printCtx.lineWidth = 4;
        printCtx.strokeRect(retPx.x, retPx.y, retPx.w, retPx.h);
        
        printCtx.font = "bold 16px sans-serif";
        printCtx.shadowBlur = 3;
        printCtx.shadowColor = 'black';
        
        const larguraTexto = `${dim.largura.toFixed(2)}m`;
        const centerX = retPx.x + retPx.w/2;
        const medidaLargura = printCtx.measureText(larguraTexto);
        printCtx.fillStyle = 'rgba(0,0,0,0.7)';
        printCtx.fillRect(centerX - medidaLargura.width/2 - 5, retPx.y - 28, medidaLargura.width + 10, 24);
        printCtx.fillStyle = '#00ffcc';
        printCtx.fillText(larguraTexto, centerX - medidaLargura.width/2, retPx.y - 10);
        
        const alturaTexto = `${dim.altura.toFixed(2)}m`;
        const medidaAltura = printCtx.measureText(alturaTexto);
        const centerY = retPx.y + retPx.h/2;
        
        printCtx.save();
        printCtx.translate(retPx.x - 20, centerY);
        printCtx.rotate(-Math.PI/2);
        printCtx.fillStyle = 'rgba(0,0,0,0.7)';
        printCtx.fillRect(-medidaAltura.width/2 - 5, -12, medidaAltura.width + 10, 24);
        printCtx.fillStyle = '#00ffcc';
        printCtx.fillText(alturaTexto, -medidaAltura.width/2, 5);
        printCtx.restore();
        
        const dataHora = new Date().toLocaleString();
        const textoInfo = `📐 ${dim.altura.toFixed(3)}m  |  📏 ${dim.largura.toFixed(3)}m  |  📊 ${dim.area.toFixed(3)}m²  |  ${dataHora}`;
        
        printCtx.fillStyle = 'rgba(0,0,0,0.8)';
        printCtx.fillRect(0, printCanvas.height - 45, printCanvas.width, 50);
        
        printCtx.font = "13px sans-serif";
        printCtx.fillStyle = '#ffffff';
        printCtx.shadowBlur = 0;
        printCtx.fillText(textoInfo, 15, printCanvas.height - 18);
        
        return printCanvas;
    }
    
    async function finalizarMedicao() {
        const dim = getMetros();
        if (!dim.altura || !dim.largura) {
            alert("⚠️ Ajuste o retângulo VERDE sobre a placa/outdoor antes de salvar!");
            return;
        }
        sharePopup.classList.remove('oculto');
    }
    
    async function compartilhar() {
        try {
            const printCanvas = await criarImagemFinal();
            printCanvas.toBlob(async (blob) => {
                const file = new File([blob], `medicao_${Date.now()}.png`, { type: 'image/png' });
                
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: 'Medição Outdoor',
                            text: `Altura: ${getMetros().altura.toFixed(3)}m | Largura: ${getMetros().largura.toFixed(3)}m | Área: ${getMetros().area.toFixed(3)}m²`,
                            files: [file]
                        });
                    } catch(e) {
                        if (e.name !== 'AbortError') {
                            alert("Compartilhamento cancelado ou não suportado.");
                        }
                    }
                } else {
                    alert("Seu navegador não suporta compartilhamento nativo. Use a opção 'Salvar no Celular'.");
                }
                sharePopup.classList.add('oculto');
            }, 'image/png');
        } catch(err) {
            alert("Erro ao compartilhar: " + err.message);
        }
    }
    
    async function salvarLocal() {
        try {
            const printCanvas = await criarImagemFinal();
            printCanvas.toBlob((blob) => {
                const link = document.createElement('a');
                link.download = `medicao_${Date.now()}.png`;
                link.href = URL.createObjectURL(blob);
                link.click();
                URL.revokeObjectURL(link.href);
                alert("📸 Imagem salva na pasta de downloads!");
                sharePopup.classList.add('oculto');
            }, 'image/png');
        } catch(err) {
            alert("Erro ao salvar: " + err.message);
        }
    }
    
    function fecharPopup() {
        sharePopup.classList.add('oculto');
    }
    
    function togglePainel() {
        painelVisivel = !painelVisivel;
        if (painelVisivel) {
            painel.classList.remove('oculto');
            eyeBtn.innerHTML = '👁️';
        } else {
            painel.classList.add('oculto');
            eyeBtn.innerHTML = '🚫';
        }
    }
    
    function redimensionar() {
        canvasW = window.innerWidth;
        canvasH = window.innerHeight;
        canvasMedicao.width = canvasW;
        canvasMedicao.height = canvasH;
        if (imgWidth && imgHeight) calcularImgRect();
        if (imagemCapturada) desenhar();
    }
    
    capturePhotoBtn.addEventListener('click', capturarFoto);
    galleryBtn.addEventListener('click', abrirGaleria);
    fileInput.addEventListener('change', carregarFotoArquivo);
    eyeBtn.addEventListener('click', togglePainel);
    saveMedicaoBtn.addEventListener('click', finalizarMedicao);
    shareBtn.addEventListener('click', compartilhar);
    saveLocalBtn.addEventListener('click', salvarLocal);
    cancelPopupBtn.addEventListener('click', fecharPopup);
    orientVerticalBtn.addEventListener('click', () => mudarOrientacao('vertical'));
    orientHorizontalBtn.addEventListener('click', () => mudarOrientacao('horizontal'));
    aplicarRef.addEventListener('click', aplicarReferencia);
    finalizarBtn.addEventListener('click', finalizarMedicao);
    window.addEventListener('resize', redimensionar);
    
    canvasMedicao.addEventListener('touchstart', handleTouchStart, { passive: false });
    canvasMedicao.addEventListener('touchmove', handleTouchMove, { passive: false });
    canvasMedicao.addEventListener('touchend', handleTouchEnd);
    
    redimensionar();
    iniciarCamera();
</script>
