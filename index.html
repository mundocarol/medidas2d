<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Medidor Profissional - Outdoor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Câmera fullscreen */
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Canvas para desenho */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            touch-action: none;
        }

        /* Botão olho (mostrar/ocultar menu) */
        .eye-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 55px;
            height: 55px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3);
            font-size: 28px;
            transition: 0.2s;
        }

        .eye-btn:active {
            transform: scale(0.95);
        }

        /* Painel de controle */
        .painel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 16px;
            z-index: 25;
            transition: opacity 0.3s, visibility 0.3s;
            border: 1px solid rgba(255,255,255,0.15);
            max-height: 60%;
            overflow-y: auto;
        }

        .painel.oculto {
            opacity: 0;
            visibility: hidden;
        }

        /* Resultados */
        .resultados {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            margin-bottom: 12px;
        }

        .area-grande {
            font-size: 38px;
            font-weight: bold;
            color: #ffaa44;
        }

        .medidas-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .medida-card {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px;
        }

        .medida-label {
            font-size: 11px;
            color: #aaa;
        }

        .medida-valor {
            font-size: 18px;
            font-weight: bold;
            color: #ffaa44;
        }

        /* Botões de modo */
        .modos {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .modo-btn {
            flex: 1;
            background: #333;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .modo-btn.ativo {
            background: #2196f3;
        }

        /* Opções de orientação da referência */
        .orientacao {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .orientacao-btn {
            flex: 1;
            background: #444;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .orientacao-btn.ativo {
            background: #ff9800;
        }

        /* Input da referência */
        .ref-input {
            background: #222;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 12px;
        }

        .ref-input label {
            font-size: 12px;
            color: #aaa;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .input-group input {
            flex: 1;
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
        }

        .input-group button {
            background: #4caf50;
            padding: 10px 16px;
            width: auto;
            margin: 0;
        }

        /* Botões gerais */
        button {
            background: #2196f3;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 6px;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-reset {
            background: #f44336;
        }

        .btn-salvar {
            background: #4caf50;
        }

        .dica {
            font-size: 11px;
            text-align: center;
            padding: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .area-grande { font-size: 30px; }
            .modo-btn { padding: 10px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="eye-btn" id="eyeBtn">👁️</div>

    <div class="painel" id="painel">
        <div class="resultados">
            <div class="area-grande" id="areaDisplay">--- m²</div>
            <div class="medidas-row">
                <div class="medida-card">
                    <div class="medida-label">📐 Altura</div>
                    <div class="medida-valor" id="alturaDisplay">--- m</div>
                </div>
                <div class="medida-card">
                    <div class="medida-label">📏 Largura</div>
                    <div class="medida-valor" id="larguraDisplay">--- m</div>
                </div>
            </div>
        </div>

        <div class="modos">
            <button id="modoRefBtn" class="modo-btn ativo">📏 Ajustar Referência</button>
            <button id="modoRetBtn" class="modo-btn">⬚ Ajustar Retângulo</button>
        </div>

        <div id="refConfig">
            <div class="orientacao">
                <button id="orientVerticalBtn" class="orientacao-btn ativo">📏 Vertical</button>
                <button id="orientHorizontalBtn" class="orientacao-btn">📐 Horizontal</button>
            </div>
            <div class="ref-input">
                <label>🔧 Tamanho real da referência (metros):</label>
                <div class="input-group">
                    <input type="number" id="refTamanho" step="0.01" value="1.00">
                    <button id="aplicarRef">Aplicar</button>
                </div>
                <div class="dica" id="dicaRef">
                    👆 Arraste os pontos VERMELHOS na vertical para alinhar com um objeto de altura conhecida
                </div>
            </div>
        </div>

        <div id="retConfig" style="display:none;">
            <div class="dica" style="background:#00ffcc22;">
                👆 Arraste as alças VERDES ou o centro para ajustar o retângulo na placa
            </div>
        </div>

        <button id="salvarBtn" class="btn-salvar">💾 Salvar Medição</button>
        <button id="resetBtn" class="btn-reset">🗑️ Limpar Tudo</button>
    </div>

    <script>
        // Elementos
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Estado
        let modoAtual = 'referencia'; // 'referencia' ou 'retangulo'
        let painelVisivel = true;
        let orientacaoRef = 'vertical'; // 'vertical' ou 'horizontal'
        
        // Retângulo (coordenadas normalizadas 0-1)
        let retangulo = {
            x: 0.3, y: 0.3,
            width: 0.4, height: 0.4
        };
        
        // Referência
        let referencia = {
            p1: { x: 0.5, y: 0.7 },  // ponto inferior
            p2: { x: 0.5, y: 0.5 },  // ponto superior
            tamanhoReal: 1.0
        };
        
        let pixelsPorMetro = null;
        let arrastando = false;
        let itemArrastando = null;
        let ultimoToque = null;
        
        // UI Elements
        const areaDisplay = document.getElementById('areaDisplay');
        const alturaDisplay = document.getElementById('alturaDisplay');
        const larguraDisplay = document.getElementById('larguraDisplay');
        const eyeBtn = document.getElementById('eyeBtn');
        const painel = document.getElementById('painel');
        const modoRefBtn = document.getElementById('modoRefBtn');
        const modoRetBtn = document.getElementById('modoRetBtn');
        const refConfig = document.getElementById('refConfig');
        const retConfig = document.getElementById('retConfig');
        const orientVerticalBtn = document.getElementById('orientVerticalBtn');
        const orientHorizontalBtn = document.getElementById('orientHorizontalBtn');
        const refTamanho = document.getElementById('refTamanho');
        const aplicarRef = document.getElementById('aplicarRef');
        const dicaRef = document.getElementById('dicaRef');
        const salvarBtn = document.getElementById('salvarBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        let canvasW, canvasH;
        let videoRect = { x: 0, y: 0, w: 0, h: 0 };
        let cameraAtiva = false;
        
        // Calcular onde o vídeo está no canvas
        function calcularVideoRect() {
            if (!video.videoWidth || !video.videoHeight) return;
            
            const videoAspect = video.videoWidth / video.videoHeight;
            const canvasAspect = canvasW / canvasH;
            
            if (videoAspect > canvasAspect) {
                videoRect.w = canvasW;
                videoRect.h = canvasW / videoAspect;
                videoRect.x = 0;
                videoRect.y = (canvasH - videoRect.h) / 2;
            } else {
                videoRect.h = canvasH;
                videoRect.w = canvasH * videoAspect;
                videoRect.x = (canvasW - videoRect.w) / 2;
                videoRect.y = 0;
            }
        }
        
        // Normalizado para pixel
        function normToPixel(p) {
            return {
                x: videoRect.x + p.x * videoRect.w,
                y: videoRect.y + p.y * videoRect.h
            };
        }
        
        // Pixel para normalizado
        function pixelToNorm(px, py) {
            return {
                x: (px - videoRect.x) / videoRect.w,
                y: (py - videoRect.y) / videoRect.h
            };
        }
        
        // Distância entre dois pontos normalizados em pixels
        function distanciaPixels(p1, p2) {
            const a = normToPixel(p1);
            const b = normToPixel(p2);
            return Math.hypot(a.x - b.x, a.y - b.y);
        }
        
        // Atualizar escala
        function atualizarEscala() {
            const dist = distanciaPixels(referencia.p1, referencia.p2);
            if (dist > 0 && referencia.tamanhoReal > 0) {
                pixelsPorMetro = dist / referencia.tamanhoReal;
            }
        }
        
        // Obter dimensões em metros
        function getMetros() {
            if (!pixelsPorMetro) return { altura: null, largura: null, area: null };
            const altPx = retangulo.height * videoRect.h;
            const largPx = retangulo.width * videoRect.w;
            const altM = altPx / pixelsPorMetro;
            const largM = largPx / pixelsPorMetro;
            return { altura: altM, largura: largM, area: altM * largM };
        }
        
        // Aplicar restrições de orientação da referência
        function aplicarRestricaoReferencia() {
            if (orientacaoRef === 'vertical') {
                // Mantém mesmo X, só permite mover Y
                const xMedio = (referencia.p1.x + referencia.p2.x) / 2;
                referencia.p1.x = xMedio;
                referencia.p2.x = xMedio;
            } else {
                // Mantém mesmo Y, só permite mover X
                const yMedio = (referencia.p1.y + referencia.p2.y) / 2;
                referencia.p1.y = yMedio;
                referencia.p2.y = yMedio;
            }
            
            // Limitar dentro da tela
            referencia.p1.x = Math.min(0.98, Math.max(0.02, referencia.p1.x));
            referencia.p1.y = Math.min(0.98, Math.max(0.02, referencia.p1.y));
            referencia.p2.x = Math.min(0.98, Math.max(0.02, referencia.p2.x));
            referencia.p2.y = Math.min(0.98, Math.max(0.02, referencia.p2.y));
        }
        
        // Mudar orientação
        function mudarOrientacao(orient) {
            orientacaoRef = orient;
            if (orient === 'vertical') {
                orientVerticalBtn.classList.add('ativo');
                orientHorizontalBtn.classList.remove('ativo');
                dicaRef.innerHTML = '👆 Arraste os pontos VERMELHOS na VERTICAL para alinhar com um objeto de altura conhecida';
                
                // Ajustar pontos para ficarem na mesma vertical
                const xMedio = (referencia.p1.x + referencia.p2.x) / 2;
                referencia.p1.x = xMedio;
                referencia.p2.x = xMedio;
            } else {
                orientVerticalBtn.classList.remove('ativo');
                orientHorizontalBtn.classList.add('ativo');
                dicaRef.innerHTML = '👆 Arraste os pontos VERMELHOS na HORIZONTAL para alinhar com um objeto de largura conhecida';
                
                // Ajustar pontos para ficarem na mesma horizontal
                const yMedio = (referencia.p1.y + referencia.p2.y) / 2;
                referencia.p1.y = yMedio;
                referencia.p2.y = yMedio;
            }
            desenhar();
        }
        
        // Desenhar tudo
        function desenhar() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvasW, canvasH);
            
            if (videoRect.w === 0) calcularVideoRect();
            
            // Desenhar REFERÊNCIA
            const refP1 = normToPixel(referencia.p1);
            const refP2 = normToPixel(referencia.p2);
            
            ctx.beginPath();
            ctx.moveTo(refP1.x, refP1.y);
            ctx.lineTo(refP2.x, refP2.y);
            ctx.strokeStyle = '#ff3366';
            ctx.lineWidth = 5;
            ctx.setLineDash([12, 8]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Pontos da referência (sempre visíveis, mas destacados no modo referência)
            const tamanhoPonto = modoAtual === 'referencia' ? 22 : 12;
            
            ctx.beginPath();
            ctx.arc(refP1.x, refP1.y, tamanhoPonto, 0, 2*Math.PI);
            ctx.fillStyle = '#ff3366';
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = `bold ${modoAtual === 'referencia' ? 16 : 12}px sans-serif`;
            ctx.fillText("1", refP1.x-5, refP1.y+6);
            
            ctx.beginPath();
            ctx.arc(refP2.x, refP2.y, tamanhoPonto, 0, 2*Math.PI);
            ctx.fillStyle = '#ff3366';
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.fillText("2", refP2.x-5, refP2.y+6);
            
            // Mostrar tamanho da referência
            const distPx = distanciaPixels(referencia.p1, referencia.p2);
            const mx = (refP1.x + refP2.x)/2;
            const my = (refP1.y + refP2.y)/2;
            ctx.font = "bold 12px sans-serif";
            ctx.fillStyle = '#ff99aa';
            ctx.fillText(`${distPx.toFixed(0)}px = ${referencia.tamanhoReal.toFixed(2)}m`, mx-40, my-15);
            
            // Desenhar RETÂNGULO
            const retPx = {
                x: videoRect.x + retangulo.x * videoRect.w,
                y: videoRect.y + retangulo.y * videoRect.h,
                w: retangulo.width * videoRect.w,
                h: retangulo.height * videoRect.h
            };
            
            const corRetangulo = modoAtual === 'retangulo' ? '#00ffcc' : '#88aaff';
            ctx.strokeStyle = corRetangulo;
            ctx.lineWidth = 4;
            ctx.setLineDash([]);
            ctx.strokeRect(retPx.x, retPx.y, retPx.w, retPx.h);
            
            ctx.fillStyle = modoAtual === 'retangulo' ? 'rgba(0,255,200,0.15)' : 'rgba(136,170,255,0.1)';
            ctx.fillRect(retPx.x, retPx.y, retPx.w, retPx.h);
            
            // Alças do retângulo (apenas no modo retângulo)
            if (modoAtual === 'retangulo') {
                const tamanhoAlca = 20;
                const cantos = [
                    { x: retPx.x, y: retPx.y, tipo: 'cantoTL', label: '◉' },
                    { x: retPx.x + retPx.w, y: retPx.y, tipo: 'cantoTR', label: '◉' },
                    { x: retPx.x, y: retPx.y + retPx.h, tipo: 'cantoBL', label: '◉' },
                    { x: retPx.x + retPx.w, y: retPx.y + retPx.h, tipo: 'cantoBR', label: '◉' }
                ];
                
                cantos.forEach(canto => {
                    ctx.fillStyle = '#00ffcc';
                    ctx.beginPath();
                    ctx.arc(canto.x, canto.y, tamanhoAlca/2, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(canto.x, canto.y, tamanhoAlca/3, 0, 2*Math.PI);
                    ctx.fill();
                });
                
                // Centro
                const centroX = retPx.x + retPx.w/2;
                const centroY = retPx.y + retPx.h/2;
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.arc(centroX, centroY, 15, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = '#00ffcc';
                ctx.beginPath();
                ctx.arc(centroX, centroY, 8, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = "bold 10px sans-serif";
                ctx.fillText("⤫", centroX-4, centroY+4);
            }
            
            // Atualizar medidas em metros
            atualizarEscala();
            const dimensoes = getMetros();
            if (dimensoes.altura && dimensoes.largura) {
                alturaDisplay.innerHTML = dimensoes.altura.toFixed(3) + ' m';
                larguraDisplay.innerHTML = dimensoes.largura.toFixed(3) + ' m';
                areaDisplay.innerHTML = dimensoes.area.toFixed(3) + ' m²';
            } else {
                alturaDisplay.innerHTML = '--- m';
                larguraDisplay.innerHTML = '--- m';
                areaDisplay.innerHTML = '--- m²';
            }
        }
        
        // Verificar qual elemento foi tocado
        function verificarToque(px, py) {
            const retPx = {
                x: videoRect.x + retangulo.x * videoRect.w,
                y: videoRect.y + retangulo.y * videoRect.h,
                w: retangulo.width * videoRect.w,
                h: retangulo.height * videoRect.h
            };
            
            const tamanhoAlca = 35;
            
            // Cantos do retângulo
            if (Math.hypot(px - retPx.x, py - retPx.y) < tamanhoAlca) return 'cantoTL';
            if (Math.hypot(px - (retPx.x + retPx.w), py - retPx.y) < tamanhoAlca) return 'cantoTR';
            if (Math.hypot(px - retPx.x, py - (retPx.y + retPx.h)) < tamanhoAlca) return 'cantoBL';
            if (Math.hypot(px - (retPx.x + retPx.w), py - (retPx.y + retPx.h)) < tamanhoAlca) return 'cantoBR';
            
            // Centro
            const centroX = retPx.x + retPx.w/2;
            const centroY = retPx.y + retPx.h/2;
            if (Math.hypot(px - centroX, py - centroY) < 40) return 'mover';
            
            // Pontos da referência
            const refP1 = normToPixel(referencia.p1);
            const refP2 = normToPixel(referencia.p2);
            if (Math.hypot(px - refP1.x, py - refP1.y) < 35) return 'ref1';
            if (Math.hypot(px - refP2.x, py - refP2.y) < 35) return 'ref2';
            
            return null;
        }
        
        // Eventos de toque
        function handleTouchStart(e) {
            if (!cameraAtiva) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const touch = e.touches[0];
            let canvasX = (touch.clientX - rect.left) * scaleX;
            let canvasY = (touch.clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), canvasW);
            canvasY = Math.min(Math.max(0, canvasY), canvasH);
            
            const item = verificarToque(canvasX, canvasY);
            
            if (item) {
                arrastando = true;
                itemArrastando = item;
                ultimoToque = { x: canvasX, y: canvasY };
            }
        }
        
        function handleTouchMove(e) {
            if (!arrastando || !ultimoToque) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const touch = e.touches[0];
            let canvasX = (touch.clientX - rect.left) * scaleX;
            let canvasY = (touch.clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), canvasW);
            canvasY = Math.min(Math.max(0, canvasY), canvasH);
            
            const deltaX = (canvasX - ultimoToque.x) / videoRect.w;
            const deltaY = (canvasY - ultimoToque.y) / videoRect.h;
            
            if (itemArrastando === 'cantoTL') {
                retangulo.width -= deltaX;
                retangulo.height -= deltaY;
                retangulo.x += deltaX;
                retangulo.y += deltaY;
            } else if (itemArrastando === 'cantoTR') {
                retangulo.width += deltaX;
                retangulo.height -= deltaY;
                retangulo.y += deltaY;
            } else if (itemArrastando === 'cantoBL') {
                retangulo.width -= deltaX;
                retangulo.height += deltaY;
                retangulo.x += deltaX;
            } else if (itemArrastando === 'cantoBR') {
                retangulo.width += deltaX;
                retangulo.height += deltaY;
            } else if (itemArrastando === 'mover') {
                retangulo.x += deltaX;
                retangulo.y += deltaY;
            } else if (itemArrastando === 'ref1') {
                referencia.p1.x += deltaX;
                referencia.p1.y += deltaY;
                aplicarRestricaoReferencia();
            } else if (itemArrastando === 'ref2') {
                referencia.p2.x += deltaX;
                referencia.p2.y += deltaY;
                aplicarRestricaoReferencia();
            }
            
            // Restringir retângulo
            retangulo.x = Math.min(0.98, Math.max(0, retangulo.x));
            retangulo.y = Math.min(0.98, Math.max(0, retangulo.y));
            retangulo.width = Math.min(1 - retangulo.x, Math.max(0.02, retangulo.width));
            retangulo.height = Math.min(1 - retangulo.y, Math.max(0.02, retangulo.height));
            
            ultimoToque = { x: canvasX, y: canvasY };
            desenhar();
        }
        
        function handleTouchEnd() {
            arrastando = false;
            itemArrastando = null;
            desenhar();
        }
        
        // Funções de controle
        function mudarModo(modo) {
            modoAtual = modo;
            if (modo === 'referencia') {
                modoRefBtn.classList.add('ativo');
                modoRetBtn.classList.remove('ativo');
                refConfig.style.display = 'block';
                retConfig.style.display = 'none';
            } else {
                modoRefBtn.classList.remove('ativo');
                modoRetBtn.classList.add('ativo');
                refConfig.style.display = 'none';
                retConfig.style.display = 'block';
            }
            desenhar();
        }
        
        function aplicarReferencia() {
            referencia.tamanhoReal = parseFloat(refTamanho.value);
            if (isNaN(referencia.tamanhoReal) || referencia.tamanhoReal <= 0) {
                referencia.tamanhoReal = 1.0;
                refTamanho.value = '1.00';
            }
            atualizarEscala();
            desenhar();
        }
        
        function salvarMedicao() {
            const dim = getMetros();
            if (dim.altura && dim.largura) {
                const msg = `📊 MEDIÇÃO SALVA:\n\nAltura: ${dim.altura.toFixed(3)} m\nLargura: ${dim.largura.toFixed(3)} m\nÁrea: ${dim.area.toFixed(3)} m²\n\nReferência: ${referencia.tamanhoReal.toFixed(2)} m (${orientacaoRef})`;
                alert(msg);
                navigator.clipboard?.writeText(`${dim.altura.toFixed(3)} x ${dim.largura.toFixed(3)} = ${dim.area.toFixed(3)} m²`);
            } else {
                alert("⚠️ Ajuste a referência primeiro! Arraste a linha vermelha para um objeto de tamanho conhecido.");
            }
        }
        
        function resetCompleto() {
            retangulo = { x: 0.3, y: 0.3, width: 0.4, height: 0.4 };
            referencia = {
                p1: { x: 0.5, y: 0.7 },
                p2: { x: 0.5, y: 0.5 },
                tamanhoReal: parseFloat(refTamanho.value)
            };
            aplicarRestricaoReferencia();
            pixelsPorMetro = null;
            desenhar();
        }
        
        function togglePainel() {
            painelVisivel = !painelVisivel;
            if (painelVisivel) {
                painel.classList.remove('oculto');
                eyeBtn.innerHTML = '👁️';
            } else {
                painel.classList.add('oculto');
                eyeBtn.innerHTML = '🚫';
            }
        }
        
        // Inicializar câmera
        async function iniciarCamera() {
            try {
                if (window.stream) {
                    window.stream.getTracks().forEach(track => track.stop());
                }
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                window.stream = stream;
                video.srcObject = stream;
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
                cameraAtiva = true;
                redimensionar();
                iniciarLoop();
            } catch(err) {
                alert("Erro ao acessar câmera. Verifique as permissões.");
                console.error(err);
            }
        }
        
        function redimensionar() {
            canvasW = window.innerWidth;
            canvasH = window.innerHeight;
            canvas.width = canvasW;
            canvas.height = canvasH;
            calcularVideoRect();
            desenhar();
        }
        
        function iniciarLoop() {
            function loop() {
                if (cameraAtiva && video.readyState >= 2) {
                    if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                        redimensionar();
                    }
                    desenhar();
                }
                requestAnimationFrame(loop);
            }
            loop();
        }
        
        // Event listeners
        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd);
        
        eyeBtn.addEventListener('click', togglePainel);
        modoRefBtn.addEventListener('click', () => mudarModo('referencia'));
        modoRetBtn.addEventListener('click', () => mudarModo('retangulo'));
        orientVerticalBtn.addEventListener('click', () => mudarOrientacao('vertical'));
        orientHorizontalBtn.addEventListener('click', () => mudarOrientacao('horizontal'));
        aplicarRef.addEventListener('click', aplicarReferencia);
        salvarBtn.addEventListener('click', salvarMedicao);
        resetBtn.addEventListener('click', resetCompleto);
        window.addEventListener('resize', redimensionar);
        
        // Iniciar
        iniciarCamera();
    </script>
</body>
</html>
