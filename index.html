<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Medidor Profissional - Interface Limpa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Câmera fullscreen */
        .camera-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            touch-action: none;
        }

        /* Botão flutuante para mostrar/ocultar menu */
        .toggle-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
            font-size: 24px;
            transition: 0.3s;
        }

        .toggle-menu:active {
            transform: scale(0.95);
        }

        /* Menu principal (ocultável) */
        .menu {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 16px;
            z-index: 25;
            transition: transform 0.3s ease, opacity 0.3s;
            border: 1px solid rgba(255,255,255,0.15);
            max-height: 70%;
            overflow-y: auto;
        }

        .menu.escondido {
            transform: translateY(120%);
            opacity: 0;
            pointer-events: none;
        }

        /* Resultados */
        .resultados {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            margin-bottom: 12px;
        }

        .valor-grande {
            font-size: 40px;
            font-weight: bold;
            color: #ffaa44;
            line-height: 1;
        }

        .medidas-grid {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .medida-item {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 8px;
            text-align: center;
        }

        .medida-label {
            font-size: 11px;
            color: #aaa;
        }

        .medida-valor {
            font-size: 18px;
            font-weight: bold;
            color: #ffaa44;
        }

        /* Modos */
        .modos {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .modo-btn {
            flex: 1;
            background: #333;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .modo-btn.ativo {
            background: #2196f3;
        }

        .modo-btn:active {
            transform: scale(0.97);
        }

        /* Painel de referência */
        .painel {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .input-group input {
            flex: 1;
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }

        .btn-small {
            background: #4caf50;
            padding: 10px 16px;
            margin: 0;
            width: auto;
        }

        button {
            background: #2196f3;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 6px;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-reset {
            background: #f44336;
        }

        .btn-salvar {
            background: #4caf50;
        }

        .status {
            font-size: 11px;
            text-align: center;
            padding: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            margin-top: 8px;
        }

        /* Indicador de modo atual */
        .modo-indicador {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 20;
            pointer-events: none;
            border-left: 3px solid #ffaa44;
        }

        @media (max-width: 600px) {
            .valor-grande { font-size: 32px; }
            .medida-valor { font-size: 16px; }
            .modo-btn { padding: 10px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<div class="modo-indicador" id="modoIndicador">📏 MODO: REFERÊNCIA</div>
<div class="toggle-menu" id="toggleMenuBtn">⚙️</div>

<div class="menu" id="menu">
    <div class="resultados">
        <div class="valor-grande" id="areaDisplay">--- m²</div>
        <div class="medidas-grid">
            <div class="medida-item">
                <div class="medida-label">📐 Altura</div>
                <div class="medida-valor" id="alturaDisplay">--- m</div>
            </div>
            <div class="medida-item">
                <div class="medida-label">📏 Largura</div>
                <div class="medida-valor" id="larguraDisplay">--- m</div>
            </div>
        </div>
    </div>

    <div class="modos">
        <button id="modoRefBtn" class="modo-btn ativo">📏 AJUSTAR REFERÊNCIA</button>
        <button id="modoRetBtn" class="modo-btn">⬚ AJUSTAR RETÂNGULO</button>
    </div>

    <div id="refPanel" class="painel">
        <div style="font-size:13px; margin-bottom:6px;">🔧 Tamanho real da referência:</div>
        <div class="input-group">
            <input type="number" id="refTamanho" step="0.01" value="1.00" placeholder="Metros">
            <button id="aplicarRefBtn" class="btn-small">APLICAR</button>
        </div>
        <div class="status" style="margin-top:8px; background:#ff980033;">
            👆 Arraste os pontos VERMELHOS na tela para alinhar com um objeto de tamanho conhecido
        </div>
    </div>

    <div id="retPanel" class="painel" style="display:none;">
        <div class="status" style="background:#00ffcc22;">
            👆 Arraste as alças VERDES ou o centro para ajustar o retângulo na placa
        </div>
        <div class="medidas-grid" style="margin-top:8px;">
            <div class="medida-item">
                <div class="medida-label">📐 Altura (px)</div>
                <div class="medida-valor" id="alturaPx">0 px</div>
            </div>
            <div class="medida-item">
                <div class="medida-label">📏 Largura (px)</div>
                <div class="medida-valor" id="larguraPx">0 px</div>
            </div>
        </div>
    </div>

    <button id="salvarBtn" class="btn-salvar">💾 SALVAR MEDIÇÃO</button>
    <button id="resetBtn" class="btn-reset">🗑️ LIMPAR TUDO</button>
</div>

<script>
    (function() {
        // Elementos
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Estado
        let modoAtual = 'referencia'; // 'referencia' ou 'retangulo'
        let menuVisivel = true;
        
        // Retângulo da placa (coordenadas normalizadas 0-1)
        let retangulo = {
            x: 0.3, y: 0.3,
            width: 0.4, height: 0.4
        };
        
        // Referência: linha vertical
        let referencia = {
            ponto1: { x: 0.5, y: 0.75 },  // base
            ponto2: { x: 0.5, y: 0.55 },  // topo
            tamanhoReal: 1.0
        };
        
        let pixelsPorMetro = null;
        let arrastando = false;
        let pontoArrastando = null;
        let ultimoToque = null;
        
        // UI Elements
        const areaDisplay = document.getElementById('areaDisplay');
        const alturaDisplay = document.getElementById('alturaDisplay');
        const larguraDisplay = document.getElementById('larguraDisplay');
        const alturaPxSpan = document.getElementById('alturaPx');
        const larguraPxSpan = document.getElementById('larguraPx');
        const modoIndicador = document.getElementById('modoIndicador');
        const toggleMenuBtn = document.getElementById('toggleMenuBtn');
        const menu = document.getElementById('menu');
        const modoRefBtn = document.getElementById('modoRefBtn');
        const modoRetBtn = document.getElementById('modoRetBtn');
        const refPanel = document.getElementById('refPanel');
        const retPanel = document.getElementById('retPanel');
        const refTamanhoInput = document.getElementById('refTamanho');
        const aplicarRefBtn = document.getElementById('aplicarRefBtn');
        const salvarBtn = document.getElementById('salvarBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        let canvasWidth, canvasHeight;
        let streamAtual = null;
        let cameraAtiva = false;
        let videoRect = { x: 0, y: 0, width: 0, height: 0 };
        
        // Calcular área do vídeo no canvas
        function calcularVideoRect() {
            if (!video.videoWidth || !video.videoHeight) return;
            const videoAspect = video.videoWidth / video.videoHeight;
            const canvasAspect = canvasWidth / canvasHeight;
            
            if (videoAspect > canvasAspect) {
                videoRect.width = canvasWidth;
                videoRect.height = canvasWidth / videoAspect;
                videoRect.x = 0;
                videoRect.y = (canvasHeight - videoRect.height) / 2;
            } else {
                videoRect.height = canvasHeight;
                videoRect.width = canvasHeight * videoAspect;
                videoRect.x = (canvasWidth - videoRect.width) / 2;
                videoRect.y = 0;
            }
        }
        
        // Converter coordenada normalizada para pixel
        function normParaPixel(p) {
            return {
                x: videoRect.x + p.x * videoRect.width,
                y: videoRect.y + p.y * videoRect.height
            };
        }
        
        // Converter pixel para normalizado
        function pixelParaNorm(pixel) {
            return {
                x: (pixel.x - videoRect.x) / videoRect.width,
                y: (pixel.y - videoRect.y) / videoRect.height
            };
        }
        
        // Distância em pixels entre pontos normalizados
        function distanciaPixels(p1, p2) {
            const p1px = normParaPixel(p1);
            const p2px = normParaPixel(p2);
            return Math.hypot(p1px.x - p2px.x, p1px.y - p2px.y);
        }
        
        // Atualizar escala
        function atualizarEscala() {
            const distPx = distanciaPixels(referencia.ponto1, referencia.ponto2);
            if (distPx > 0 && referencia.tamanhoReal > 0) {
                pixelsPorMetro = distPx / referencia.tamanhoReal;
            }
        }
        
        // Obter dimensões em metros
        function getDimensoesMetros() {
            if (!pixelsPorMetro) return { altura: null, largura: null, area: null };
            const alturaPx = retangulo.height * videoRect.height;
            const larguraPx = retangulo.width * videoRect.width;
            const alturaM = alturaPx / pixelsPorMetro;
            const larguraM = larguraPx / pixelsPorMetro;
            return { altura: alturaM, largura: larguraM, area: alturaM * larguraM };
        }
        
        // Desenhar tudo na tela
        function desenhar() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            
            if (videoRect.width === 0) calcularVideoRect();
            
            // Desenhar REFERÊNCIA (sempre visível)
            const refP1 = normParaPixel(referencia.ponto1);
            const refP2 = normParaPixel(referencia.ponto2);
            
            ctx.beginPath();
            ctx.moveTo(refP1.x, refP1.y);
            ctx.lineTo(refP2.x, refP2.y);
            ctx.strokeStyle = '#ff3366';
            ctx.lineWidth = 4;
            ctx.setLineDash([10, 8]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Pontos da referência (destacados no modo referência)
            if (modoAtual === 'referencia') {
                desenharPonto(refP1, '#ff3366', '●', 16);
                desenharPonto(refP2, '#ff3366', '●', 16);
                
                // Mostrar tamanho da referência
                const distPx = distanciaPixels(referencia.ponto1, referencia.ponto2);
                const mx = (refP1.x + refP2.x)/2;
                const my = (refP1.y + refP2.y)/2;
                ctx.font = "bold 14px 'Segoe UI'";
                ctx.fillStyle = '#ff99aa';
                ctx.shadowBlur = 2;
                ctx.fillText(`${distPx.toFixed(0)}px = ${referencia.tamanhoReal.toFixed(2)}m`, mx-45, my-12);
                ctx.fillStyle = 'white';
                ctx.shadowBlur = 0;
            } else {
                // Texto menor da referência
                ctx.font = "10px 'Segoe UI'";
                ctx.fillStyle = '#ff99aa';
                ctx.fillText(`Ref: ${referencia.tamanhoReal.toFixed(2)}m`, 10, 40);
            }
            
            // Desenhar RETÂNGULO
            const retPx = {
                x: videoRect.x + retangulo.x * videoRect.width,
                y: videoRect.y + retangulo.y * videoRect.height,
                w: retangulo.width * videoRect.width,
                h: retangulo.height * videoRect.height
            };
            
            const corRetangulo = modoAtual === 'retangulo' ? '#00ffcc' : '#88aaff';
            ctx.strokeStyle = corRetangulo;
            ctx.lineWidth = 4;
            ctx.setLineDash([]);
            ctx.strokeRect(retPx.x, retPx.y, retPx.w, retPx.h);
            
            ctx.fillStyle = modoAtual === 'retangulo' ? 'rgba(0,255,200,0.15)' : 'rgba(136,170,255,0.1)';
            ctx.fillRect(retPx.x, retPx.y, retPx.w, retPx.h);
            
            // Alças do retângulo (apenas no modo retângulo)
            if (modoAtual === 'retangulo') {
                const tamanhoAlca = 18;
                const cantos = [
                    { x: retPx.x, y: retPx.y, tipo: 'cantoTL' },
                    { x: retPx.x + retPx.w, y: retPx.y, tipo: 'cantoTR' },
                    { x: retPx.x, y: retPx.y + retPx.h, tipo: 'cantoBL' },
                    { x: retPx.x + retPx.w, y: retPx.y + retPx.h, tipo: 'cantoBR' }
                ];
                
                cantos.forEach(canto => {
                    ctx.fillStyle = '#00ffcc';
                    ctx.beginPath();
                    ctx.arc(canto.x, canto.y, tamanhoAlca/2, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(canto.x, canto.y, tamanhoAlca/3, 0, 2*Math.PI);
                    ctx.fill();
                });
                
                // Centro
                const centroX = retPx.x + retPx.w/2;
                const centroY = retPx.y + retPx.h/2;
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.arc(centroX, centroY, 12, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = '#00ffcc';
                ctx.beginPath();
                ctx.arc(centroX, centroY, 7, 0, 2*Math.PI);
                ctx.fill();
            }
            
            // Atualizar textos em pixels
            const alturaPxAtual = retangulo.height * videoRect.height;
            const larguraPxAtual = retangulo.width * videoRect.width;
            alturaPxSpan.innerText = Math.round(alturaPxAtual) + ' px';
            larguraPxSpan.innerText = Math.round(larguraPxAtual) + ' px';
            
            // Atualizar medidas em metros
            atualizarEscala();
            const dimensoes = getDimensoesMetros();
            if (dimensoes.altura && dimensoes.largura) {
                alturaDisplay.innerHTML = dimensoes.altura.toFixed(3) + ' m';
                larguraDisplay.innerHTML = dimensoes.largura.toFixed(3) + ' m';
                areaDisplay.innerHTML = dimensoes.area.toFixed(3) + ' m²';
            } else {
                alturaDisplay.innerHTML = '--- m';
                larguraDisplay.innerHTML = '--- m';
                areaDisplay.innerHTML = '--- m²';
            }
        }
        
        function desenharPonto(p, cor, texto, raio) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, raio, 0, 2*Math.PI);
            ctx.fillStyle = cor;
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = "bold 16px 'Segoe UI'";
            ctx.fillText(texto, p.x-5, p.y-10);
        }
        
        // Verificar qual elemento foi tocado
        function verificarToque(pixelX, pixelY) {
            const retPx = {
                x: videoRect.x + retangulo.x * videoRect.width,
                y: videoRect.y + retangulo.y * videoRect.height,
                w: retangulo.width * videoRect.width,
                h: retangulo.height * videoRect.height
            };
            
            const tamanhoAlca = 30;
            
            // Cantos do retângulo
            if (Math.hypot(pixelX - retPx.x, pixelY - retPx.y) < tamanhoAlca) return 'cantoTL';
            if (Math.hypot(pixelX - (retPx.x + retPx.w), pixelY - retPx.y) < tamanhoAlca) return 'cantoTR';
            if (Math.hypot(pixelX - retPx.x, pixelY - (retPx.y + retPx.h)) < tamanhoAlca) return 'cantoBL';
            if (Math.hypot(pixelX - (retPx.x + retPx.w), pixelY - (retPx.y + retPx.h)) < tamanhoAlca) return 'cantoBR';
            
            // Centro
            const centroX = retPx.x + retPx.w/2;
            const centroY = retPx.y + retPx.h/2;
            if (Math.hypot(pixelX - centroX, pixelY - centroY) < 35) return 'mover';
            
            // Pontos da referência
            const refP1 = normParaPixel(referencia.ponto1);
            const refP2 = normParaPixel(referencia.ponto2);
            if (Math.hypot(pixelX - refP1.x, pixelY - refP1.y) < 30) return 'ref1';
            if (Math.hypot(pixelX - refP2.x, pixelY - refP2.y) < 30) return 'ref2';
            
            return null;
        }
        
        // Eventos de toque
        function handleTouchStart(e) {
            if (!cameraAtiva) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX = e.touches[0].clientX;
            let clientY = e.touches[0].clientY;
            
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), canvasWidth);
            canvasY = Math.min(Math.max(0, canvasY), canvasHeight);
            
            const alca = verificarToque(canvasX, canvasY);
            
            if (alca) {
                arrastando = true;
                pontoArrastando = alca;
                ultimoToque = { x: canvasX, y: canvasY };
            }
        }
        
        function handleTouchMove(e) {
            if (!arrastando || !ultimoToque) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX = e.touches[0].clientX;
            let clientY = e.touches[0].clientY;
            
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), canvasWidth);
            canvasY = Math.min(Math.max(0, canvasY), canvasHeight);
            
            const deltaX = (canvasX - ultimoToque.x) / videoRect.width;
            const deltaY = (canvasY - ultimoToque.y) / videoRect.height;
            
            if (pontoArrastando === 'cantoTL') {
                retangulo.width -= deltaX;
                retangulo.height -= deltaY;
                retangulo.x += deltaX;
                retangulo.y += deltaY;
            } else if (pontoArrastando === 'cantoTR') {
                retangulo.width += deltaX;
                retangulo.height -= deltaY;
                retangulo.y += deltaY;
            } else if (pontoArrastando === 'cantoBL') {
                retangulo.width -= deltaX;
                retangulo.height += deltaY;
                retangulo.x += deltaX;
            } else if (pontoArrastando === 'cantoBR') {
                retangulo.width += deltaX;
                retangulo.height += deltaY;
            } else if (pontoArrastando === 'mover') {
                retangulo.x += deltaX;
                retangulo.y += deltaY;
            } else if (pontoArrastando === 'ref1') {
                referencia.ponto1.x += deltaX;
                referencia.ponto1.y += deltaY;
                referencia.ponto1.x = Math.min(0.98, Math.max(0.02, referencia.ponto1.x));
                referencia.ponto1.y = Math.min(0.98, Math.max(0.02, referencia.ponto1.y));
            } else if (pontoArrastando === 'ref2') {
                referencia.ponto2.x += deltaX;
                referencia.ponto2.y += deltaY;
                referencia.ponto2.x = Math.min(0.98, Math.max(0.02, referencia.ponto2.x));
                referencia.ponto2.y = Math.min(0.98, Math.max(0.02, referencia.ponto2.y));
            }
            
            // Restringir retângulo
            retangulo.x = Math.min(0.98, Math.max(0, retangulo.x));
            retangulo.y = Math.min(0.98, Math.max(0, retangulo.y));
            retangulo.width = Math.min(1 - retangulo.x, Math.max(0.02, retangulo.width));
            retangulo.height = Math.min(1 - retangulo.y, Math.max(0.02, retangulo.height));
            
            ultimoToque = { x: canvasX, y: canvasY };
            desenhar();
        }
        
        function handleTouchEnd() {
            arrastando = false;
            pontoArrastando = null;
            desenhar();
        }
        
        // Funções de controle
        function mudarModo(modo) {
            modoAtual = modo;
            if (modo === 'referencia') {
                modoRefBtn.classList.add('ativo');
                modoRetBtn.classList.remove('ativo');
                refPanel.style.display = 'block';
                retPanel.style.display = 'none';
                modoIndicador.innerHTML = '📏 MODO: REFERÊNCIA (arraste pontos vermelhos)';
                modoIndicador.style.borderLeftColor = '#ff3366';
            } else {
                modoRefBtn.classList.remove('ativo');
                modoRetBtn.classList.add('ativo');
                refPanel.style.display = 'none';
                retPanel.style.display = 'block';
                modoIndicador.innerHTML = '⬚ MODO: RETÂNGULO (arraste alças verdes)';
                modoIndicador.style.borderLeftColor = '#00ffcc';
            }
            desenhar();
        }
        
        function aplicarReferencia() {
            referencia.tamanhoReal = parseFloat(refTamanhoInput.value);
            if (isNaN(referencia.tamanhoReal) || referencia.tamanhoReal <= 0) {
                referencia.tamanhoReal = 1.0;
                refTamanhoInput.value = '1.00';
            }
            atualizarEscala();
            desenhar();
        }
        
        function salvarMedicao() {
            const dimensoes = getDimensoesMetros();
            if (dimensoes.altura && dimensoes.largura) {
                const mensagem = `📊 MEDIÇÃO SALVA:\nAltura: ${dimensoes.altura.toFixed(3)} m\nLargura: ${dimensoes.largura.toFixed(3)} m\nÁrea: ${dimensoes.area.toFixed(3)} m²\nReferência: ${referencia.tamanhoReal.toFixed(2)} m`;
                alert(mensagem);
                
                // Opcional: copiar para clipboard
                navigator.clipboard?.writeText(`${dimensoes.altura.toFixed(3)} x ${dimensoes.largura.toFixed(3)} = ${dimensoes.area.toFixed(3)} m²`);
            } else {
                alert("⚠️ Ajuste a referência primeiro! Arraste a linha vermelha para um objeto de tamanho conhecido.");
            }
        }
        
        function resetCompleto() {
            retangulo = { x: 0.3, y: 0.3, width: 0.4, height: 0.4 };
            referencia = {
                ponto1: { x: 0.5, y: 0.75 },
                ponto2: { x: 0.5, y: 0.55 },
                tamanhoReal: parseFloat(refTamanhoInput.value)
            };
            pixelsPorMetro = null;
            desenhar();
        }
        
        function toggleMenu() {
            menuVisivel = !menuVisivel;
            if (menuVisivel) {
                menu.classList.remove('escondido');
                toggleMenuBtn.innerHTML = '✖️';
            } else {
                menu.classList.add('escondido');
                toggleMenuBtn.innerHTML = '⚙️';
            }
        }
        
        // Inicializar câmera
        async function iniciarCamera() {
            try {
                if (streamAtual) streamAtual.getTracks().forEach(track => track.stop());
                const constraints = { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                streamAtual = stream;
                video.srcObject = stream;
                await new Promise((resolve) => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
                cameraAtiva = true;
                redimensionar();
                iniciarLoop();
            } catch(err) {
                alert("Erro ao acessar câmera. Verifique as permissões.");
            }
        }
        
        function redimensionar() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            calcularVideoRect();
            desenhar();
        }
        
        function iniciarLoop() {
            function loop() {
                if (cameraAtiva && video.readyState >= 2) {
                    if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) redimensionar();
                    desenhar();
                }
                requestAnimationFrame(loop);
            }
            loop();
        }
        
        // Event listeners
        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd);
        
        toggleMenuBtn.addEventListener('click', toggleMenu);
        modoRefBtn.addEventListener('click', () => mudarModo('referencia'));
        modoRetBtn.addEventListener('click', () => mudarModo('retangulo'));
        aplicarRefBtn.addEventListener('click', aplicarReferencia);
        salvarBtn.addEventListener('click', salvarMedicao);
        resetBtn.addEventListener('click', resetCompleto);
        window.addEventListener('resize', redimensionar);
        
        // Iniciar
        iniciarCamera();
    })();
</script>
</body>
</html>
