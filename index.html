<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Medidor Profissional - Outdoor com Retângulo Editável</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .camera-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            touch-action: none;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            margin: 12px;
            padding: 14px;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.15);
            max-height: 45%;
            overflow-y: auto;
        }

        .resultado-box {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            margin-bottom: 10px;
        }

        .altura-valor {
            font-size: 36px;
            font-weight: bold;
            color: #ffaa44;
            line-height: 1;
        }

        .largura-valor, .area-valor {
            font-size: 18px;
            font-weight: bold;
            display: inline-block;
            margin: 0 6px;
        }

        .label-pequeno {
            font-size: 11px;
            color: #aaa;
        }

        .modo-painel {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .modo-btn {
            flex: 1;
            background: #333;
            border: none;
            color: white;
            padding: 8px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .modo-btn.ativo {
            background: #2196f3;
        }

        .referencia-config {
            background: #222;
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .ref-input-group {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 6px;
        }

        .ref-input-group input {
            flex: 1;
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 8px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }

        .ref-input-group button {
            background: #4caf50;
            margin: 0;
            padding: 8px 16px;
            width: auto;
        }

        button {
            background: #2196f3;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin-top: 6px;
            width: 100%;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-reset {
            background: #f44336;
        }

        .btn-confirmar {
            background: #4caf50;
        }

        .btn-editar {
            background: #ff9800;
        }

        .status {
            font-size: 11px;
            text-align: center;
            padding: 6px;
            background: rgba(0,0,0,0.6);
            border-radius: 16px;
            margin-top: 6px;
        }

        .medidas-atuais {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            gap: 8px;
        }

        .medida-card {
            flex: 1;
            background: #1e1e2f;
            border-radius: 12px;
            padding: 6px;
            text-align: center;
        }

        .medida-card .valor {
            font-size: 20px;
            font-weight: bold;
            color: #ffaa44;
        }

        .erro-camera {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            z-index: 30;
            width: 80%;
        }

        @media (max-width: 600px) {
            .altura-valor { font-size: 28px; }
            .medida-card .valor { font-size: 16px; }
        }
    </style>
</head>
<body>
<div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<div class="controls">
    <div class="resultado-box">
        <div class="label-pequeno">📏 MEDIÇÃO REAL</div>
        <div class="altura-valor" id="alturaDisplay">--- <span style="font-size:18px;">m</span></div>
        <div class="medidas-atuais">
            <div class="medida-card">
                <div class="label-pequeno">📐 Largura</div>
                <div class="valor" id="larguraDisplay">--- m</div>
            </div>
            <div class="medida-card">
                <div class="label-pequeno">📐 Área</div>
                <div class="valor" id="areaDisplay">--- m²</div>
            </div>
        </div>
    </div>

    <div class="modo-painel">
        <button id="modoRetanguloBtn" class="modo-btn ativo">✏️ EDITAR RETÂNGULO</button>
        <button id="modoReferenciaBtn" class="modo-btn">📏 EDITAR REFERÊNCIA</button>
    </div>

    <div id="referenciaPanel" class="referencia-config" style="display: none;">
        <div class="label-pequeno">🔧 TAMANHO REAL DA REFERÊNCIA</div>
        <div class="ref-input-group">
            <input type="number" id="refTamanho" step="0.01" value="1.00" placeholder="Metros">
            <button id="aplicarRefBtn">APLICAR</button>
        </div>
        <div class="status" style="margin-top: 6px; background:#ff980033;">
            📌 Toque e arraste os pontos VERMELHOS para ajustar a linha de referência
        </div>
    </div>

    <div id="retanguloPanel">
        <div class="status" id="statusMsg">
            🟩 MODO RETÂNGULO: Toque e arraste na tela para desenhar/ajustar o retângulo
        </div>
        <div class="medidas-atuais" style="margin-top: 6px;">
            <div class="medida-card">
                <div class="label-pequeno">📏 Altura (pixels)</div>
                <div class="valor" id="alturaPx">0 px</div>
            </div>
            <div class="medida-card">
                <div class="label-pequeno">📏 Largura (pixels)</div>
                <div class="valor" id="larguraPx">0 px</div>
            </div>
        </div>
    </div>

    <button id="resetBtn" class="btn-reset">🔄 LIMPAR TUDO</button>
</div>

<div id="erroCamera" class="erro-camera" style="display: none;">
    ⚠️ Erro na câmera<br><br>
    <button id="tentarNovamenteBtn">📸 TENTAR NOVAMENTE</button>
</div>

<script>
    (function() {
        // Elementos
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Modos
        let modoAtual = 'retangulo'; // 'retangulo' ou 'referencia'
        
        // Retângulo da placa (coordenadas normalizadas 0-1)
        let retangulo = {
            x: 0.3, y: 0.3,
            width: 0.4, height: 0.4
        };
        
        // Referência: linha vertical (dois pontos normalizados)
        let referencia = {
            ponto1: { x: 0.5, y: 0.7 },  // base
            ponto2: { x: 0.5, y: 0.5 },  // topo
            tamanhoReal: 1.0  // metros
        };
        
        let pixelsPorMetro = null;
        let arrastando = false;
        let pontoArrastando = null; // 'cantoTL', 'cantoTR', 'cantoBL', 'cantoBR', 'mover', 'ref1', 'ref2'
        let ultimoToque = null;
        
        // UI
        const alturaDisplay = document.getElementById('alturaDisplay');
        const larguraDisplay = document.getElementById('larguraDisplay');
        const areaDisplay = document.getElementById('areaDisplay');
        const alturaPxSpan = document.getElementById('alturaPx');
        const larguraPxSpan = document.getElementById('larguraPx');
        const statusMsg = document.getElementById('statusMsg');
        const resetBtn = document.getElementById('resetBtn');
        const modoRetanguloBtn = document.getElementById('modoRetanguloBtn');
        const modoReferenciaBtn = document.getElementById('modoReferenciaBtn');
        const referenciaPanel = document.getElementById('referenciaPanel');
        const retanguloPanel = document.getElementById('retanguloPanel');
        const refTamanhoInput = document.getElementById('refTamanho');
        const aplicarRefBtn = document.getElementById('aplicarRefBtn');
        
        let canvasWidth, canvasHeight;
        let streamAtual = null;
        let cameraAtiva = false;
        let videoRect = { x: 0, y: 0, width: 0, height: 0 };
        
        // Calcular área do vídeo no canvas
        function calcularVideoRect() {
            if (!video.videoWidth || !video.videoHeight) return;
            const videoAspect = video.videoWidth / video.videoHeight;
            const canvasAspect = canvasWidth / canvasHeight;
            
            if (videoAspect > canvasAspect) {
                videoRect.width = canvasWidth;
                videoRect.height = canvasWidth / videoAspect;
                videoRect.x = 0;
                videoRect.y = (canvasHeight - videoRect.height) / 2;
            } else {
                videoRect.height = canvasHeight;
                videoRect.width = canvasHeight * videoAspect;
                videoRect.x = (canvasWidth - videoRect.width) / 2;
                videoRect.y = 0;
            }
        }
        
        // Converter coordenada normalizada (0-1) para pixel no canvas
        function normParaPixel(p) {
            return {
                x: videoRect.x + p.x * videoRect.width,
                y: videoRect.y + p.y * videoRect.height
            };
        }
        
        // Converter pixel para normalizado
        function pixelParaNorm(pixel) {
            return {
                x: (pixel.x - videoRect.x) / videoRect.width,
                y: (pixel.y - videoRect.y) / videoRect.height
            };
        }
        
        // Calcular distância em pixels entre dois pontos normalizados
        function distanciaPixels(p1, p2) {
            const p1px = normParaPixel(p1);
            const p2px = normParaPixel(p2);
            return Math.hypot(p1px.x - p2px.x, p1px.y - p2px.y);
        }
        
        // Atualizar escala com base na referência
        function atualizarEscala() {
            const distPx = distanciaPixels(referencia.ponto1, referencia.ponto2);
            if (distPx > 0 && referencia.tamanhoReal > 0) {
                pixelsPorMetro = distPx / referencia.tamanhoReal;
            }
        }
        
        // Obter dimensões do retângulo em metros
        function getDimensoesMetros() {
            if (!pixelsPorMetro) return { altura: null, largura: null, area: null };
            
            const alturaPx = retangulo.height * videoRect.height;
            const larguraPx = retangulo.width * videoRect.width;
            
            const alturaM = alturaPx / pixelsPorMetro;
            const larguraM = larguraPx / pixelsPorMetro;
            
            return { altura: alturaM, largura: larguraM, area: alturaM * larguraM };
        }
        
        // Desenhar tudo
        function desenhar() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            
            if (videoRect.width === 0) calcularVideoRect();
            
            // Desenhar borda do vídeo
            if (videoRect.width > 0) {
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 2;
                ctx.strokeRect(videoRect.x, videoRect.y, videoRect.width, videoRect.height);
            }
            
            // Desenhar REFERÊNCIA (linha vermelha)
            const refP1 = normParaPixel(referencia.ponto1);
            const refP2 = normParaPixel(referencia.ponto2);
            
            ctx.beginPath();
            ctx.moveTo(refP1.x, refP1.y);
            ctx.lineTo(refP2.x, refP2.y);
            ctx.strokeStyle = '#ff3366';
            ctx.lineWidth = 4;
            ctx.setLineDash([10, 8]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Pontos da referência (apenas se modo referência)
            if (modoAtual === 'referencia') {
                desenharPonto(refP1, '#ff3366', '●', 14);
                desenharPonto(refP2, '#ff3366', '●', 14);
                
                // Texto com tamanho
                const distPx = distanciaPixels(referencia.ponto1, referencia.ponto2);
                const mx = (refP1.x + refP2.x)/2;
                const my = (refP1.y + refP2.y)/2;
                ctx.font = "bold 14px 'Segoe UI'";
                ctx.fillStyle = '#ff99aa';
                ctx.shadowBlur = 2;
                ctx.fillText(`${distPx.toFixed(0)}px = ${referencia.tamanhoReal.toFixed(2)}m`, mx-40, my-10);
                ctx.fillStyle = 'white';
                ctx.shadowBlur = 0;
            } else {
                // Mostrar apenas texto menor
                const distPx = distanciaPixels(referencia.ponto1, referencia.ponto2);
                ctx.font = "10px 'Segoe UI'";
                ctx.fillStyle = '#ff99aa';
                ctx.fillText(`Ref: ${referencia.tamanhoReal.toFixed(2)}m`, 10, 30);
            }
            
            // Desenhar RETÂNGULO da placa
            const retPx = {
                x: videoRect.x + retangulo.x * videoRect.width,
                y: videoRect.y + retangulo.y * videoRect.height,
                w: retangulo.width * videoRect.width,
                h: retangulo.height * videoRect.height
            };
            
            ctx.strokeStyle = modoAtual === 'retangulo' ? '#00ffcc' : '#88aaff';
            ctx.lineWidth = 4;
            ctx.setLineDash([]);
            ctx.strokeRect(retPx.x, retPx.y, retPx.w, retPx.h);
            
            // Preenchimento semitransparente
            ctx.fillStyle = modoAtual === 'retangulo' ? 'rgba(0,255,200,0.1)' : 'rgba(136,170,255,0.1)';
            ctx.fillRect(retPx.x, retPx.y, retPx.w, retPx.h);
            
            // Alças de redimensionamento (apenas no modo retângulo)
            if (modoAtual === 'retangulo') {
                const tamanhoAlca = 16;
                const cantos = [
                    { x: retPx.x, y: retPx.y, tipo: 'cantoTL' },
                    { x: retPx.x + retPx.w, y: retPx.y, tipo: 'cantoTR' },
                    { x: retPx.x, y: retPx.y + retPx.h, tipo: 'cantoBL' },
                    { x: retPx.x + retPx.w, y: retPx.y + retPx.h, tipo: 'cantoBR' }
                ];
                
                cantos.forEach(canto => {
                    ctx.fillStyle = '#00ffcc';
                    ctx.beginPath();
                    ctx.arc(canto.x, canto.y, tamanhoAlca/2, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(canto.x, canto.y, tamanhoAlca/3, 0, 2*Math.PI);
                    ctx.fill();
                });
                
                // Centro para mover
                const centroX = retPx.x + retPx.w/2;
                const centroY = retPx.y + retPx.h/2;
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(centroX, centroY, 10, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = '#00ffcc';
                ctx.beginPath();
                ctx.arc(centroX, centroY, 6, 0, 2*Math.PI);
                ctx.fill();
            }
            
            // Texto com dimensões em pixels
            const alturaPxAtual = retangulo.height * videoRect.height;
            const larguraPxAtual = retangulo.width * videoRect.width;
            alturaPxSpan.innerText = Math.round(alturaPxAtual) + ' px';
            larguraPxSpan.innerText = Math.round(larguraPxAtual) + ' px';
            
            // Atualizar medidas em metros
            atualizarEscala();
            const dimensoes = getDimensoesMetros();
            if (dimensoes.altura && dimensoes.largura) {
                alturaDisplay.innerHTML = dimensoes.altura.toFixed(3) + ' <span style="font-size:18px;">m</span>';
                larguraDisplay.innerHTML = dimensoes.largura.toFixed(3) + ' m';
                areaDisplay.innerHTML = dimensoes.area.toFixed(3) + ' m²';
            } else {
                alturaDisplay.innerHTML = '--- <span style="font-size:18px;">m</span>';
                larguraDisplay.innerHTML = '--- m';
                areaDisplay.innerHTML = '--- m²';
            }
        }
        
        function desenharPonto(p, cor, texto, raio) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, raio, 0, 2*Math.PI);
            ctx.fillStyle = cor;
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = "bold 14px 'Segoe UI'";
            ctx.fillText(texto, p.x-5, p.y-8);
        }
        
        // Verificar qual alça foi tocada
        function verificarToque(pixelX, pixelY) {
            const retPx = {
                x: videoRect.x + retangulo.x * videoRect.width,
                y: videoRect.y + retangulo.y * videoRect.height,
                w: retangulo.width * videoRect.width,
                h: retangulo.height * videoRect.height
            };
            
            const tamanhoAlca = 25;
            
            // Cantos
            if (Math.hypot(pixelX - retPx.x, pixelY - retPx.y) < tamanhoAlca) return 'cantoTL';
            if (Math.hypot(pixelX - (retPx.x + retPx.w), pixelY - retPx.y) < tamanhoAlca) return 'cantoTR';
            if (Math.hypot(pixelX - retPx.x, pixelY - (retPx.y + retPx.h)) < tamanhoAlca) return 'cantoBL';
            if (Math.hypot(pixelX - (retPx.x + retPx.w), pixelY - (retPx.y + retPx.h)) < tamanhoAlca) return 'cantoBR';
            
            // Centro (mover)
            const centroX = retPx.x + retPx.w/2;
            const centroY = retPx.y + retPx.h/2;
            if (Math.hypot(pixelX - centroX, pixelY - centroY) < 30) return 'mover';
            
            // Pontos da referência (se modo referência)
            if (modoAtual === 'referencia') {
                const refP1 = normParaPixel(referencia.ponto1);
                const refP2 = normParaPixel(referencia.ponto2);
                if (Math.hypot(pixelX - refP1.x, pixelY - refP1.y) < 25) return 'ref1';
                if (Math.hypot(pixelX - refP2.x, pixelY - refP2.y) < 25) return 'ref2';
            }
            
            return null;
        }
        
        function handleTouchStart(e) {
            if (!cameraAtiva) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX = e.touches[0].clientX;
            let clientY = e.touches[0].clientY;
            
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), canvasWidth);
            canvasY = Math.min(Math.max(0, canvasY), canvasHeight);
            
            const pontoPixel = { x: canvasX, y: canvasY };
            
            // Verificar se tocou em algum controle
            const alca = verificarToque(pontoPixel.x, pontoPixel.y);
            
            if (alca) {
                arrastando = true;
                pontoArrastando = alca;
                ultimoToque = pontoPixel;
                statusMsg.innerText = `🟢 Arrastando: ${alca}`;
            } else if (modoAtual === 'retangulo') {
                // Iniciar novo retângulo
                const norm = pixelParaNorm(pontoPixel);
                if (norm.x >= 0 && norm.x <= 1 && norm.y >= 0 && norm.y <= 1) {
                    retangulo = {
                        x: norm.x,
                        y: norm.y,
                        width: 0.05,
                        height: 0.05
                    };
                    arrastando = true;
                    pontoArrastando = 'cantoBR';
                    ultimoToque = pontoPixel;
                    statusMsg.innerText = "🟢 Desenhe o retângulo arrastando";
                }
            }
            
            desenhar();
        }
        
        function handleTouchMove(e) {
            if (!arrastando || !ultimoToque) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX = e.touches[0].clientX;
            let clientY = e.touches[0].clientY;
            
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), canvasWidth);
            canvasY = Math.min(Math.max(0, canvasY), canvasHeight);
            
            const novoPixel = { x: canvasX, y: canvasY };
            const deltaX = (novoPixel.x - ultimoToque.x) / videoRect.width;
            const deltaY = (novoPixel.y - ultimoToque.y) / videoRect.height;
            
            if (pontoArrastando === 'cantoTL') {
                retangulo.width -= deltaX;
                retangulo.height -= deltaY;
                retangulo.x += deltaX;
                retangulo.y += deltaY;
            } else if (pontoArrastando === 'cantoTR') {
                retangulo.width += deltaX;
                retangulo.height -= deltaY;
                retangulo.y += deltaY;
            } else if (pontoArrastando === 'cantoBL') {
                retangulo.width -= deltaX;
                retangulo.height += deltaY;
                retangulo.x += deltaX;
            } else if (pontoArrastando === 'cantoBR') {
                retangulo.width += deltaX;
                retangulo.height += deltaY;
            } else if (pontoArrastando === 'mover') {
                retangulo.x += deltaX;
                retangulo.y += deltaY;
            } else if (pontoArrastando === 'ref1') {
                referencia.ponto1.x += deltaX;
                referencia.ponto1.y += deltaY;
                // Manter dentro dos limites
                referencia.ponto1.x = Math.min(1, Math.max(0, referencia.ponto1.x));
                referencia.ponto1.y = Math.min(1, Math.max(0, referencia.ponto1.y));
            } else if (pontoArrastando === 'ref2') {
                referencia.ponto2.x += deltaX;
                referencia.ponto2.y += deltaY;
                referencia.ponto2.x = Math.min(1, Math.max(0, referencia.ponto2.x));
                referencia.ponto2.y = Math.min(1, Math.max(0, referencia.ponto2.y));
            }
            
            // Restringir retângulo aos limites
            retangulo.x = Math.min(0.99, Math.max(0, retangulo.x));
            retangulo.y = Math.min(0.99, Math.max(0, retangulo.y));
            retangulo.width = Math.min(1 - retangulo.x, Math.max(0.01, retangulo.width));
            retangulo.height = Math.min(1 - retangulo.y, Math.max(0.01, retangulo.height));
            
            ultimoToque = novoPixel;
            desenhar();
        }
        
        function handleTouchEnd(e) {
            arrastando = false;
            pontoArrastando = null;
            statusMsg.innerText = modoAtual === 'retangulo' ? 
                "✅ Toque e arraste nas alças para ajustar o retângulo" :
                "✅ Toque e arraste nos pontos VERMELHOS para ajustar a referência";
            desenhar();
        }
        
        function resetCompleto() {
            retangulo = { x: 0.3, y: 0.3, width: 0.4, height: 0.4 };
            referencia = {
                ponto1: { x: 0.5, y: 0.7 },
                ponto2: { x: 0.5, y: 0.5 },
                tamanhoReal: parseFloat(refTamanhoInput.value)
            };
            pixelsPorMetro = null;
            desenhar();
            statusMsg.innerText = "🔄 Tudo reiniciado! Ajuste o retângulo na placa e a referência.";
        }
        
        function aplicarTamanhoReferencia() {
            referencia.tamanhoReal = parseFloat(refTamanhoInput.value);
            atualizarEscala();
            desenhar();
            statusMsg.innerText = `✅ Referência ajustada para ${referencia.tamanhoReal.toFixed(2)} metros`;
        }
        
        function mudarModo(modo) {
            modoAtual = modo;
            if (modo === 'retangulo') {
                referenciaPanel.style.display = 'none';
                retanguloPanel.style.display = 'block';
                modoRetanguloBtn.classList.add('ativo');
                modoReferenciaBtn.classList.remove('ativo');
                statusMsg.innerText = "✏️ MODO RETÂNGULO: Toque e arraste nas alças verdes para ajustar a área da placa";
            } else {
                referenciaPanel.style.display = 'block';
                retanguloPanel.style.display = 'block';
                modoRetanguloBtn.classList.remove('ativo');
                modoReferenciaBtn.classList.add('ativo');
                statusMsg.innerText = "📏 MODO REFERÊNCIA: Arraste os pontos VERMELHOS para alinhar com um objeto de tamanho conhecido";
            }
            desenhar();
        }
        
        async function iniciarCamera() {
            try {
                if (streamAtual) streamAtual.getTracks().forEach(track => track.stop());
                const constraints = { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                streamAtual = stream;
                video.srcObject = stream;
                await new Promise((resolve) => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
                cameraAtiva = true;
                document.getElementById('erroCamera').style.display = 'none';
                redimensionar();
                iniciarLoop();
            } catch(err) {
                document.getElementById('erroCamera').style.display = 'block';
            }
        }
        
        function redimensionar() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            calcularVideoRect();
            desenhar();
        }
        
        function iniciarLoop() {
            function loop() {
                if (cameraAtiva && video.readyState >= 2) {
                    if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) redimensionar();
                    desenhar();
                }
                requestAnimationFrame(loop);
            }
            loop();
        }
        
        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd);
        
        resetBtn.addEventListener('click', resetCompleto);
        modoRetanguloBtn.addEventListener('click', () => mudarModo('retangulo'));
        modoReferenciaBtn.addEventListener('click', () => mudarModo('referencia'));
        aplicarRefBtn.addEventListener('click', aplicarTamanhoReferencia);
        document.getElementById('tentarNovamenteBtn').addEventListener('click', iniciarCamera);
        
        window.addEventListener('resize', redimensionar);
        
        iniciarCamera();
    })();
</script>
</body>
</html>
